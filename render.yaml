services:
  - type: web
    name: ddosguard-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false          # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app,http://localhost:3000
